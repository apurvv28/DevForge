name: CI
on: [push]
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: node:latest
    steps:
      - uses: actions/checkout@a81bbbf8298c0fa03ea29cdc473d45769f953675
      - uses: actions/setup-node@1a4442cacd436585916779262731d1f5baa8e04a
        with:
          node-version: '20'
      - run: npm ci
      - run: npm test
